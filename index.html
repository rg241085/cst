<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DryFu - Verify</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#134E5E">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>

<body style="background:#f1f5f9;">

    <div class="container">
        <div class="card" style="margin-top: 20px;">
            <h2 class="title">Verification Panel</h2>
            <label class="input-label">Invoice Amount</label>
            <input type="tel" id="checkBill" class="big-input" placeholder="₹ 0.00" inputmode="numeric">
            <label class="input-label">Coupon Code</label>
            <input type="tel" id="checkInput" class="big-input" placeholder="000-000-000" maxlength="11"
                oninput="formatInput(this)" inputmode="numeric">
            <button class="main-btn verify-btn" onclick="validateCoupon()">VERIFY NOW</button>
            <div id="checkResult" class="result-box"></div>
        </div>

        <div class="report-card" id="printableReport">
            <div class="report-header">
                <h3 class="report-title">📝 Daily Ledger</h3>
                <span id="reportDate" class="report-date">--/--</span>
            </div>

            <div class="stats-row">
                <div class="mini-stat">
                    <span class="ms-label">REDEEMED</span>
                    <span id="myRedeemCount" class="ms-val" style="color:var(--primary)">0</span>
                </div>
                <div class="mini-stat">
                    <span class="ms-label">TOTAL DISC.</span>
                    <span id="myTotalDisc" class="ms-val" style="color:#ef4444">₹0</span>
                </div>
            </div>

            <div style="overflow-x:auto;">
                <table class="receipt-table">
                    <thead>
                        <tr>
                            <th width="25%">Code</th>
                            <th width="25%">Inv.</th>
                            <th width="25%" class="col-right">Disc.</th>
                            <th width="25%" class="col-right">Pay</th>
                        </tr>
                    </thead>
                    <tbody id="dailyReportBody"></tbody>
                </table>
            </div>

            <div style="text-align:center; padding:10px; background:#f8fafc; font-size:10px; color:#999;">
                Generated by DryFu System
            </div>
        </div>

        <button class="download-btn" onclick="downloadReport()">
            📸 Save Report as Image
        </button>
        <button id="installAppBtn" class="main-btn verify-btn"
            style="display:none; background:#10b981; margin-top:10px;">
            📱 Install App on Mobile
        </button>

        <div style="text-align:center; margin-top:10px; font-size:10px; color:#999;">
            List auto-resets everyday
        </div>
    </div>

    <script src="script.js"></script>
    <script>
        // Register Service Worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('SW Registered', reg))
                    .catch(err => console.log('SW Error', err));
            });
        }

        // Custom Install Button Logic
        let deferredPrompt;
        const installBtn = document.getElementById('installAppBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            // Default popup ko roko
            e.preventDefault();
            // Event ko save karo taaki baad me trigger kar sakein
            deferredPrompt = e;
            // Apna custom button show karo
            installBtn.style.display = 'block';
        });

        installBtn.addEventListener('click', async () => {
            if (deferredPrompt !== null) {
                // Install popup show karo
                deferredPrompt.prompt();
                // User ke response ka wait karo (Install kiya ya Cancel)
                const { outcome } = await deferredPrompt.userChoice;
                if (outcome === 'accepted') {
                    console.log('User accepted the install prompt');
                    installBtn.style.display = 'none'; // Install hone ke baad button hide kar do
                }
                deferredPrompt = null;
            }
        });
    </script>
</body>

</html>
